<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pure CSS Bug Hunter</title>
    <style>
        /* 1. Setup the Game Canvas */
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            /* This creates the scoring system */
            counter-reset: score;
        }

        h1 { margin-bottom: 10px; }

        .game-area {
            position: relative;
            width: 600px;
            height: 400px;
            background: #2c3e50;
            border: 4px solid #34495e;
            border-radius: 10px;
            cursor: crosshair;
        }

        /* 2. The Scoring Logic */
        /* Every time an input is checked, increment the 'score' counter */
        input:checked {
            counter-increment: score;
        }

        .score-board::after {
            content: counter(score);
            font-weight: bold;
            color: #2ecc71;
            font-size: 2rem;
        }

        /* 3. The "Bugs" (Checkboxes) */
        input[type="checkbox"] {
            position: absolute;
            appearance: none;
            width: 40px;
            height: 40px;
            background: #e74c3c;
            border-radius: 50%;
            cursor: pointer;
            z-index: 2;
            transition: transform 0.2s;
        }

        /* Hide the bug once it is clicked */
        input[type="checkbox"]:checked {
            display: none;
        }

        /* 4. Animations */
        @keyframes crawl {
            0% { top: 0%; left: 0%; }
            25% { top: 80%; left: 20%; }
            50% { top: 30%; left: 70%; }
            75% { top: 90%; left: 90%; }
            100% { top: 0%; left: 0%; }
        }

        @keyframes crawl-alt {
            0% { top: 100%; left: 100%; }
            30% { top: 10%; left: 50%; }
            60% { top: 50%; left: 10%; }
            100% { top: 100%; left: 100%; }
        }

        /* Assign different speeds and paths to each bug */
        .bug-1 { animation: crawl 5s infinite linear; }
        .bug-2 { animation: crawl-alt 7s infinite linear; }
        .bug-3 { animation: crawl 4s infinite reverse; }
        .bug-4 { animation: crawl-alt 6s infinite reverse; }

        .instructions {
            margin-top: 20px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <h1>Bug Hunter</h1>
    <div class="score-board">Score: </div>

    <div class="game-area">
        <input type="checkbox" class="bug-1">
        <input type="checkbox" class="bug-2">
        <input type="checkbox" class="bug-3">
        <input type="checkbox" class="bug-4">
    </div>

    <p class="instructions">Click the red dots to exterminate them! Refresh to restart.</p>

</body>
</html>
